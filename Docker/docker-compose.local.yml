version: '3'

networks:
  backend:
    driver: bridge

volumes:
  django_db_data: {}
  media_data: {}
  static_vol: {}
  celery_db_data: {}  # Add this

services:

  django:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    container_name: local_Alyasen_app
    command: >
      uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --loop asyncio --http h11
    restart: always
    volumes:
      - ..:/code
      - media_data:/code/media # Ensure media directory persists in the directory
      - django_db_data:/code/Docker/volumes/db_volume
      - static_vol:/code/staticfiles
    env_file:
      - ../ENV/.env.local
    environment:
      - ENVIRONMENT=local
      - DJANGO_SETTINGS_MODULE=config.django
      - PYTHONUNBUFFERED=1  # Better logging
      - PYTHONDONTWRITEBYTECODE=1  # Don't create .pyc files
      - OMP_NUM_THREADS=1
      - TF_NUM_INTRAOP_THREADS=1
      - TF_NUM_INTEROP_THREADS=1
      - ENABLE_DFU_MODEL=false
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - backend

  nginx:
    build: ../nginx/local_nginx
    container_name: local_Alyasen_nginx
    volumes:
      - static_vol:/code/staticfiles
      - media_data:/code/media
    ports:
      - "80:80"
    depends_on:
      - django
    networks:
      - backend

  