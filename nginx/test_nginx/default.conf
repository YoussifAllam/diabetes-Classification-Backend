# default.conf

# Upstream for the Django application
upstream factory_sys_app {
    # 'factory_sys_app' matches the Django container name in your docker-compose
    # '8000' is the port uvicorn is running on inside that container
    server factory_sys_app:8000;
}

# This server block handles all HTTP requests
server {
    # This MUST match the internal port from your docker-compose ("83:80")
    listen 80;
    
    # This MUST match the domain you are using
    server_name factory.emilysluxury.com;

    client_max_body_size 100M;
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;

    # Serve static files directly
    location /static/ {
        alias /code/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Serve media files directly
    location /media/ {
        alias /code/media/;
        expires 1d;
        add_header Cache-Control "public, must-revalidate, proxy-revalidate";
        # try_files $uri $uri/ =404;  <-- REMOVE THIS LINE
    }

    # Proxy all other requests to the Django application
    # This single block covers /, /api/, /admin/, /site_administration/, etc.
    location / {
        proxy_pass http://factory_sys_app;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}

